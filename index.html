<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Calculator — Premium Glass UI</title>
  <meta name="description" content="A beautiful glassmorphism calculator with dark/light mode, keyboard support, and calculation history." />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="icon" type="image/x-icon" href="assets/calculator.ico" />
  <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
  <!-- Animated Background -->
  <div class="bg-animated">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <!-- Calculator -->
  <div class="calculator" id="calculator">
    <!-- Header -->
    <div class="calc-header">
      <span class="calc-title">Calculator</span>
      <div class="header-actions">
        <button type="button" class="icon-btn" id="history-btn" title="History">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--btn-text)">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <a href="https://github.com/yourusername/Calculator" target="_blank" rel="noopener noreferrer" class="icon-btn" id="github-btn" title="View on GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color: var(--btn-text)">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
        </a>
        <button type="button" class="icon-btn" id="theme-btn" title="Toggle Theme">
          <svg id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--btn-text)">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--btn-text); display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Display -->
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <!-- Button Grid -->
    <div class="btn-grid">
      <button class="btn btn-clear" id="btn-clear" data-action="clear">C</button>
      <button class="btn btn-special" id="btn-sign" data-action="sign">±</button>
      <button class="btn btn-special" id="btn-percent" data-action="percent">%</button>
      <button class="btn btn-operator" id="btn-divide" data-action="operator" data-value="/">÷</button>

      <button class="btn" id="btn-7" data-action="number" data-value="7">7</button>
      <button class="btn" id="btn-8" data-action="number" data-value="8">8</button>
      <button class="btn" id="btn-9" data-action="number" data-value="9">9</button>
      <button class="btn btn-operator" id="btn-multiply" data-action="operator" data-value="*">×</button>

      <button class="btn" id="btn-4" data-action="number" data-value="4">4</button>
      <button class="btn" id="btn-5" data-action="number" data-value="5">5</button>
      <button class="btn" id="btn-6" data-action="number" data-value="6">6</button>
      <button class="btn btn-operator" id="btn-subtract" data-action="operator" data-value="-">−</button>

      <button class="btn" id="btn-1" data-action="number" data-value="1">1</button>
      <button class="btn" id="btn-2" data-action="number" data-value="2">2</button>
      <button class="btn" id="btn-3" data-action="number" data-value="3">3</button>
      <button class="btn btn-operator" id="btn-add" data-action="operator" data-value="+">+</button>

      <button class="btn btn-zero" id="btn-0" data-action="number" data-value="0">0</button>
      <button class="btn" id="btn-decimal" data-action="decimal" data-value=".">.</button>
      <button class="btn btn-equals" id="btn-equals" data-action="equals">=</button>
    </div>

    <!-- History Panel -->
    <div class="history-panel" id="history-panel">
      <div class="history-header">
        <span class="history-title">History</span>
        <button class="history-close" id="history-close">×</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="history-empty">No calculations yet</div>
      </div>
      <button class="history-clear-btn" id="history-clear">Clear History</button>
    </div>
  </div>

  <script src="scripts/script.js"></script>
</body>

</html>
